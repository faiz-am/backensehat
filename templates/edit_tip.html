<!DOCTYPE html>
<html>
<head>
  <title>Edit Tip</title>
</head>

<body>

<h1>Edit Tip</h1>

<form method="POST">

  <input
    type="text"
    name="title"
    value="{{ tip[1] }}"
  >

  <br><br>

  <textarea
    name="description"
  >{{ tip[2] }}</textarea>

  <br><br>

  <input
    type="text"
    name="icon"
    value="{{ tip[3] }}"
  >

  <br><br>

  <button type="submit">
    Update
  </button>

</form>

</body>
</html>
