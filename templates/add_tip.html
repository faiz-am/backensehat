<!DOCTYPE html>
<html>
<head>
  <title>Add Tip</title>
</head>

<body>

<h1>Tambah Tip</h1>

<form method="POST">

  <input
    type="text"
    name="title"
    placeholder="Title"
  >

  <br><br>

  <textarea
    name="description"
    placeholder="Description"
  ></textarea>

  <br><br>

  <input
    type="text"
    name="icon"
    placeholder="Icon"
  >

  <br><br>

  <button type="submit">
    Simpan
  </button>

</form>

</body>
</html>
